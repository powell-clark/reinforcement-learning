name: Tests

on:
  push:
    branches: [ main, claude/** ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.git,__pycache__,docs,build,dist,venv,env
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics --exclude=.git,__pycache__,docs,build,dist,venv,env

    - name: Check code formatting with black
      run: |
        black --check --diff algorithms/ utils/ tests/ || true

    - name: Type check with mypy
      run: |
        mypy algorithms/ utils/ --ignore-missing-imports || true

    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=algorithms --cov=utils --cov-report=xml --cov-report=term

    - name: Test algorithm imports
      run: |
        python -c "from algorithms import QLearning, SARSA, MonteCarlo, DQN, DoubleDQN, REINFORCE, ActorCritic; print('✓ All algorithm imports successful')"

    - name: Test utility imports
      run: |
        python -c "from utils.plotting import plot_training_curve; from utils.evaluation import evaluate_policy; from utils.wrappers import NormalizeObservation; print('✓ All utility imports successful')"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  notebook-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Test notebooks with nbval
      run: |
        # Test that notebooks can be executed
        # Currently only template exists, so just check it's valid JSON
        python -c "import json; json.load(open('notebooks/TEMPLATE_notebook.ipynb')); print('✓ Template notebook is valid')"
        # When more notebooks exist, run: pytest --nbval notebooks/

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.git,__pycache__,venv,env,build,dist
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics --exclude=.git,__pycache__,venv,env,build,dist

    - name: Check formatting
      run: |
        black --check algorithms/ utils/ tests/ || echo "::warning::Code formatting issues found. Run 'black algorithms/ utils/ tests/' to fix."

    - name: Check import sorting
      run: |
        isort --check-only --profile black algorithms/ utils/ tests/ || echo "::warning::Import sorting issues found. Run 'isort --profile black algorithms/ utils/ tests/' to fix."
